<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kennenlernen – Webdesign by Mela</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f6f3;color:#1a1a1a;min-height:100vh;padding:2rem 1rem}
.wrap{max-width:620px;margin:0 auto}
.header{text-align:center;margin-bottom:2.5rem}
.header h1{font-size:22px;font-weight:600;margin-bottom:6px;color:#1a1a1a}
.header p{font-size:14px;color:#666;line-height:1.6}
.progress-bar{height:4px;background:#e0dbd4;border-radius:2px;margin-bottom:2rem}
.progress-fill{height:4px;background:#7F77DD;border-radius:2px;transition:width 0.4s ease}
.card{background:white;border-radius:16px;padding:2rem;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.step{display:none}
.step.active{display:block}
.step-label{font-size:11px;color:#999;margin-bottom:0.5rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em}
.section-label{font-size:11px;color:#7F77DD;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
h2{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:0.4rem;line-height:1.4}
.sub{font-size:14px;color:#888;margin-bottom:1.5rem;line-height:1.6}
.options{display:flex;flex-direction:column;gap:10px;margin-bottom:2rem}
.opt{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border:1.5px solid #ede9e3;border-radius:12px;cursor:pointer;transition:all 0.15s}
.opt:hover{border-color:#c4bfff;background:#f9f8ff}
.opt.selected{border-color:#7F77DD;background:#f3f2ff}
.opt-label{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
.opt-sub{font-size:12px;color:#999;line-height:1.4}
.radio-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid #ddd;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.opt.selected .radio-dot{border-color:#7F77DD;background:#7F77DD}
.dot-inner{width:8px;height:8px;border-radius:50%;background:white;display:none}
.opt.selected .dot-inner{display:block}
.btn-row{display:flex;gap:10px;margin-top:0.5rem}
button{padding:11px 24px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;border:1.5px solid #ddd;background:white;color:#444}
button:hover{background:#f5f5f5}
button:active{transform:scale(0.98)}
.btn-primary{background:#7F77DD;border-color:#7F77DD;color:white}
.btn-primary:hover{background:#6a62c4}
.error{font-size:13px;color:#e24b4a;margin-top:8px;display:none}
.name-input{width:100%;padding:12px 16px;border:1.5px solid #ede9e3;border-radius:10px;font-size:15px;color:#1a1a1a;background:white;margin-bottom:1.5rem;outline:none;transition:border-color 0.15s}
.name-input:focus{border-color:#7F77DD}
.result-hero{text-align:center;padding:1rem 0 1.5rem}
.archetype-icon{font-size:52px;margin-bottom:1rem}
.archetype-name{font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:0.5rem}
.archetype-desc{font-size:14px;color:#666;line-height:1.7;max-width:420px;margin:0 auto}
.result-block{border-top:1px solid #f0ece6;padding-top:1.25rem;margin-top:1.25rem}
.block-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#aaa;margin-bottom:8px}
.block-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.block-desc{font-size:13px;color:#777;line-height:1.6}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.tag-purple{background:#eeecff;color:#4a45a0}
.tag-teal{background:#e1f5ee;color:#0f6e56}
.tag-amber{background:#faeeda;color:#633806}
.footer-note{margin-top:1.5rem;padding:14px 16px;background:#f8f6f3;border-radius:10px;font-size:13px;color:#999;line-height:1.6;text-align:center}
.sent-ok{color:#0f6e56;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Lass uns deine Marke kennenlernen ✨</h1>
    <p>Dieser Fragebogen hilft mir, deine Website von Anfang an auf dich und deine Zielgruppe zuzuschneiden.</p>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:10%"></div></div>
  <div class="card">
    <div id="steps"></div>
  </div>
  <p style="text-align:center;font-size:12px;color:#bbb;margin-top:1.5rem">Webdesign by Mela · Alle Angaben werden vertraulich behandelt</p>
</div>

<script>
const questions=[
  {id:"name",type:"text",label:"Schön, dass du dabei bist!",question:"Wie heißt du?",sub:"Dein Vorname reicht völlig.",placeholder:"Dein Vorname..."},
  {id:"q1",label:"Deine Marke & Persönlichkeit",question:"Welches Bild passt am besten zu deiner Marke?",sub:"Wähle das aus, das sich am natürlichsten anfühlt – nicht was du denkst, dass es sein sollte.",options:[
    {val:"creator",label:"Die Macherin",sub:"Kreativ, innovativ, schafft etwas Neues und Einzigartiges"},
    {val:"caregiver",label:"Die Unterstützerin",sub:"Fürsorglich, empathisch, stellt andere in den Mittelpunkt"},
    {val:"hero",label:"Die Kämpferin",sub:"Mutig, zielorientiert, überwindet Hindernisse"},
    {val:"sage",label:"Die Weise",sub:"Expertise, Wissen, gibt Orientierung und Klarheit"},
    {val:"explorer",label:"Die Entdeckerin",sub:"Freigeistig, abenteuerlich, sucht nach dem Besonderen"},
    {val:"innocent",label:"Die Optimistin",sub:"Authentisch, positiv, vertrauenswürdig und nahbar"}
  ]},
  {id:"q2",label:"Deine Marke & Persönlichkeit",question:"Wenn deine Marke eine Person wäre – wie würde sie auf einer Party auftreten?",sub:"",options:[
    {val:"warm",label:"Wärmend und aufmerksam",sub:"Fragt nach, hört zu, nimmt sich Zeit für jeden"},
    {val:"inspiring",label:"Inspirierend und leidenschaftlich",sub:"Erzählt Geschichten, reißt andere mit"},
    {val:"expert",label:"Kompetent und klar",sub:"Gibt konkrete Tipps, spricht Klartext"},
    {val:"bold",label:"Selbstbewusst und direkt",sub:"Hat eine klare Meinung, polarisiert auch mal"}
  ]},
  {id:"q3",label:"Farben & Ästhetik",question:"Welche Farbwelt spricht dich instinktiv an?",sub:"Denk an deinen Auftritt insgesamt – Website, Social Media, Visitenkarten.",options:[
    {val:"earth",label:"Erdtöne & Natürlichkeit",sub:"Sand, Terrakotta, Olivgrün, warmes Beige"},
    {val:"bold_color",label:"Kräftige Akzente & Kontraste",sub:"Tiefes Blau, Weinrot, Smaragd, starke Kontraste"},
    {val:"soft",label:"Sanft & Pastellig",sub:"Altrosa, Lavendel, Hellblau, zarte Töne"},
    {val:"mono",label:"Klar & Minimalistisch",sub:"Schwarz, Weiß, ein starker Akzent"}
  ]},
  {id:"q4",label:"Farben & Ästhetik",question:"Welcher Stil beschreibt deine gewünschte Wirkung?",sub:"",options:[
    {val:"modern",label:"Modern & professionell",sub:"Seriös, strukturiert, zeitgemäß"},
    {val:"warm_cozy",label:"Warm & einladend",sub:"Menschlich, herzlich, persönlich"},
    {val:"creative",label:"Kreativ & besonders",sub:"Ungewöhnlich, mutig, aus der Masse heraus"},
    {val:"natural",label:"Natürlich & authentisch",sub:"Ehrlich, bodenständig, ohne Schnickschnack"}
  ]},
  {id:"q5",label:"Deine Zielgruppe",question:"Wen möchtest du mit deiner Arbeit hauptsächlich erreichen?",sub:"",options:[
    {val:"parents_stressed",label:"Gestresste Eltern",sub:"Suchen Entlastung, Struktur und praktische Lösungen"},
    {val:"parents_growth",label:"Bewusste Eltern",sub:"Wollen sich weiterentwickeln, reflektieren, wachsen"},
    {val:"women",label:"Frauen in Veränderung",sub:"Beziehung, Beruf, Selbstfindung – suchen Orientierung"},
    {val:"broad",label:"Menschen in Krisen",sub:"Suchen Stabilität, Halt und professionelle Begleitung"}
  ]},
  {id:"q6",label:"Deine Zielgruppe",question:"Was ist der größte Schmerz deiner Wunschkundin?",sub:"",options:[
    {val:"overwhelm",label:"Überforderung & Erschöpfung",sub:"Fühlt sich hilflos, weiß nicht wo anfangen"},
    {val:"conflict",label:"Konflikte & schlechtes Klima",sub:"Streit, Missverständnisse, angespannte Beziehungen"},
    {val:"selfworth",label:"Zweifel & geringes Selbstwertgefühl",sub:"Unsicher, vergleicht sich, fühlt sich nicht gut genug"},
    {val:"direction",label:"Orientierungslosigkeit",sub:"Weiß nicht wohin, vermisst eine klare Richtung"}
  ]},
  {id:"q7",label:"Käufertyp",question:"Wie trifft deine Wunschkundin typischerweise Kaufentscheidungen?",sub:"",options:[
    {val:"emotional",label:"Emotional & impulsiv",sub:"Kauft, wenn sie sich verstanden und inspiriert fühlt"},
    {val:"rational",label:"Rational & recherchiert",sub:"Vergleicht, liest Reviews, braucht Fakten"},
    {val:"social",label:"Sozial & empfohlen",sub:"Kauft, wenn Freunde oder Bekannte es empfehlen"},
    {val:"trust",label:"Vertrauensbasiert",sub:"Braucht Zeit, kauft nur wenn echte Verbindung entsteht"}
  ]},
  {id:"q8",label:"Käufertyp",question:"Was überzeugt deine Wunschkundin letztendlich?",sub:"",options:[
    {val:"testimonial",label:"Echte Erfahrungsberichte",sub:"Geschichten anderer, Bewertungen, Vorher-Nachher"},
    {val:"expertise",label:"Fachliche Kompetenz",sub:"Ausbildung, Zertifikate, Erfahrung"},
    {val:"transformation",label:"Klares Ergebnis",sub:"Was verändert sich konkret in ihrem Leben?"},
    {val:"connection",label:"Persönliche Verbindung",sub:"Sie muss das Gefühl haben: Die versteht mich"}
  ]},
  {id:"q9",label:"Abschluss",question:"Was ist das Wichtigste, das deine Website vermitteln soll?",sub:"",options:[
    {val:"trust_safety",label:"Vertrauen & Sicherheit",sub:"Ich bin die Richtige – bei mir bist du gut aufgehoben"},
    {val:"transformation_promise",label:"Veränderung & Ergebnis",sub:"So sieht dein Leben danach aus"},
    {val:"expertise_authority",label:"Kompetenz & Autorität",sub:"Ich weiß wovon ich rede"},
    {val:"community_belonging",label:"Gemeinschaft & Zugehörigkeit",sub:"Du bist nicht allein – wir sind auf diesem Weg zusammen"}
  ]}
];

const archetypes={
  creator:{name:"Die Schöpferin",icon:"🎨",desc:"Deine Marke lebt von Originalität und Ausdruck. Du inspirierst andere, indem du selbst gestaltest und denkst. Deine Website sollte unverwechselbar sein – kein Standard-Template.",palette:["Kräftiges Orange oder Violett","Weißer Raum als Kontrast","Ein unerwarteter Akzent"]},
  caregiver:{name:"Die Beschützerin",icon:"🤲",desc:"Du bist da für andere. Deine Stärke ist Empathie und das echte Interesse an Menschen. Deine Website soll Wärme ausstrahlen und das Gefühl geben: Hier bin ich willkommen.",palette:["Warmes Beige oder Altrosa","Sanfte Grüntöne","Gebrochen Weiß statt reines Weiß"]},
  hero:{name:"Die Heldin",icon:"⚡",desc:"Du packst an. Du bist lösungsorientiert und motivierend. Deine Website soll Energie und Entschlossenheit zeigen – klare Botschaften, klare Calls to Action.",palette:["Dunkelblau oder Weinrot als Basis","Heller Akzent","Minimale Farbpalette mit maximalem Kontrast"]},
  sage:{name:"Die Weise",icon:"🔍",desc:"Du gibst Orientierung durch Wissen und Erfahrung. Deine Website soll Klarheit und Kompetenz signalisieren – strukturiert, übersichtlich, vertrauenswürdig.",palette:["Tiefes Blau oder Dunkelgrün","Cremeweiß","Dezenter Goldton als Akzent"]},
  explorer:{name:"Die Entdeckerin",icon:"🌿",desc:"Du brichst aus dem Gewöhnlichen aus. Deine Marke steht für Freiheit, Neugier und das Unkonventionelle. Deine Website darf mutig sein.",palette:["Terrakotta, Olivgrün oder tiefes Teal","Natürliche Texturen optisch","Warme Erdtöne"]},
  innocent:{name:"Die Optimistin",icon:"✨",desc:"Deine Stärke ist Authentizität und Vertrauen. Du zeigst dich so wie du bist – ohne Maske. Deine Website soll ehrlich, einladend und hell wirken.",palette:["Pastelltöne oder klares Weiß","Sanftes Blau oder Mint","Wenig Schnörkel, viel Raum"]}
};

const buyerTypes={
  emotional:{name:"Emotionale Käuferin",desc:"Sie entscheidet aus dem Bauch heraus. Sprich Gefühle an, zeige Persönlichkeit und lass sie spüren: Diese Person versteht mich. Storytelling ist dein stärkstes Tool."},
  rational:{name:"Rationale Käuferin",desc:"Sie will verstehen, bevor sie kauft. Zeige klare Fakten, Ergebnisse und Transparenz. FAQs, konkrete Zahlen und ein nachvollziehbares Angebot überzeugen sie."},
  social:{name:"Soziale Käuferin",desc:"Sie vertraut Empfehlungen mehr als Werbung. Testimonials, Community-Gefühl und Social Proof sind entscheidend. Zeige, wer schon bei dir war."},
  trust:{name:"Vertrauenskäuferin",desc:"Sie braucht Zeit und echte Verbindung. Sei konsistent sichtbar, zeige dich regelmäßig und lass sie dich kennenlernen, bevor sie kauft. Ein Erstgespräch senkt die Hürde."}
};

const zielgruppenMap={
  parents_stressed:{label:"Gestresste Eltern",pain:"Entlastung & Struktur",hook:"Endlich Luft holen"},
  parents_growth:{label:"Bewusste Eltern",pain:"Persönliches Wachstum",hook:"Mama/Papa sein & trotzdem du selbst bleiben"},
  women:{label:"Frauen in Veränderung",pain:"Orientierung & Neubeginn",hook:"Dein Leben, deine Regeln"},
  broad:{label:"Menschen in Krisen",pain:"Stabilität & Halt",hook:"Du musst das nicht alleine durchstehen"}
};

let answers={};
let currentStep=0;

function getArchetype(){
  const s={creator:0,caregiver:0,hero:0,sage:0,explorer:0,innocent:0};
  if(answers.q1)s[answers.q1]+=3;
  const m={warm:"caregiver",inspiring:"creator",expert:"sage",bold:"hero"};
  if(answers.q2&&m[answers.q2])s[m[answers.q2]]+=2;
  const m2={earth:"explorer",bold_color:"hero",soft:"caregiver",mono:"sage"};
  if(answers.q3&&m2[answers.q3])s[m2[answers.q3]]+=2;
  const m3={modern:"sage",warm_cozy:"caregiver",creative:"creator",natural:"innocent"};
  if(answers.q4&&m3[answers.q4])s[m3[answers.q4]]+=1;
  const m4={trust_safety:"caregiver",transformation_promise:"hero",expertise_authority:"sage",community_belonging:"innocent"};
  if(answers.q9&&m4[answers.q9])s[m4[answers.q9]]+=2;
  return Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0];
}

function getBuyerType(){
  const s={emotional:0,rational:0,social:0,trust:0};
  if(answers.q7)s[answers.q7]+=3;
  const m={testimonial:"social",expertise:"rational",transformation:"emotional",connection:"trust"};
  if(answers.q8&&m[answers.q8])s[m[answers.q8]]+=2;
  return Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0];
}

function renderStep(){
  const total=questions.length;
  const pct=Math.round(((currentStep+1)/total)*100);
  document.getElementById("progress").style.width=pct+"%";
  const q=questions[currentStep];
  let html=`<div class="step active">`;
  html+=`<p class="step-label">${currentStep+1} von ${total}</p>`;
  if(q.type==="text"){
    html+=`<h2>${q.question}</h2><p class="sub">${q.sub}</p>`;
    html+=`<input type="text" class="name-input" id="name-field" placeholder="${q.placeholder}" value="${answers.name||""}">`;
    html+=`<p class="error" id="field-err">Bitte trag deinen Namen ein.</p>`;
  } else {
    html+=`<p class="section-label">${q.label}</p><h2>${q.question}</h2>`;
    if(q.sub)html+=`<p class="sub">${q.sub}</p>`;
    html+=`<div class="options">`;
    q.options.forEach(o=>{
      const sel=answers[q.id]===o.val?"selected":"";
      html+=`<div class="opt ${sel}" data-val="${o.val}" data-qid="${q.id}" onclick="selectOpt(this)">
        <div class="radio-dot"><div class="dot-inner"></div></div>
        <div><div class="opt-label">${o.label}</div><div class="opt-sub">${o.sub}</div></div>
      </div>`;
    });
    html+=`</div><p class="error" id="field-err">Bitte wähle eine Option aus.</p>`;
  }
  html+=`<div class="btn-row">`;
  if(currentStep>0)html+=`<button onclick="prev()">← Zurück</button>`;
  html+=`<button class="btn-primary" onclick="next()">${currentStep===total-1?"Auswertung anzeigen →":"Weiter →"}</button>`;
  html+=`</div></div>`;
  document.getElementById("steps").innerHTML=html;
  if(q.type==="text"){
    document.getElementById("name-field").addEventListener("input",e=>{answers.name=e.target.value;});
  }
}

function selectOpt(el){
  document.querySelectorAll(".opt").forEach(o=>o.classList.remove("selected"));
  el.classList.add("selected");
  answers[el.dataset.qid]=el.dataset.val;
  document.getElementById("field-err").style.display="none";
}

function next(){
  const q=questions[currentStep];
  if(q.type==="text"){
    if(!answers.name||answers.name.trim()===""){document.getElementById("field-err").style.display="block";return;}
  } else {
    if(!answers[q.id]){document.getElementById("field-err").style.display="block";return;}
  }
  if(currentStep<questions.length-1){currentStep++;renderStep();}
  else showResult();
}

function prev(){if(currentStep>0){currentStep--;renderStep();}}

function showResult(){
  document.getElementById("progress").style.width="100%";
  const archKey=getArchetype();
  const buyKey=getBuyerType();
  const arch=archetypes[archKey];
  const buyer=buyerTypes[buyKey];
  const ziel=zielgruppenMap[answers.q5]||zielgruppenMap.broad;
  const name=answers.name||"deine Kundin";
  const stilMap={modern:"Modern & professionell",warm_cozy:"Warm & einladend",creative:"Kreativ & besonders",natural:"Natürlich & authentisch"};
  const botschaftMap={trust_safety:"Vertrauen & Sicherheit",transformation_promise:"Veränderung & Ergebnis",expertise_authority:"Kompetenz & Autorität",community_belonging:"Gemeinschaft & Zugehörigkeit"};
  const schmerzMap={overwhelm:"Überforderung & Erschöpfung",conflict:"Konflikte & schlechtes Klima",selfworth:"Zweifel & Selbstwert",direction:"Orientierungslosigkeit"};

  document.getElementById("steps").innerHTML=`
    <div class="result-hero">
      <div class="archetype-icon">${arch.icon}</div>
      <p class="section-label">Auswertung für ${name}</p>
      <div class="archetype-name">${arch.name}</div>
      <p class="archetype-desc">${arch.desc}</p>
    </div>
    <div class="result-block">
      <p class="block-label">Farbpalette & Stil</p>
      <div class="tags">${arch.palette.map(p=>`<span class="tag tag-purple">${p}</span>`).join("")}</div>
      <p style="margin-top:8px;font-size:13px;color:#888">Stilrichtung: <strong style="color:#1a1a1a">${stilMap[answers.q4]||""}</strong></p>
    </div>
    <div class="result-block">
      <p class="block-label">Käufertyp der Zielgruppe</p>
      <p class="block-title">${buyer.name}</p>
      <p class="block-desc">${buyer.desc}</p>
    </div>
    <div class="result-block">
      <p class="block-label">Zielgruppen-Profil</p>
      <p class="block-title">${ziel.label}</p>
      <p style="font-size:13px;color:#888;margin-bottom:6px">Hauptschmerz: <span class="tag tag-teal">${ziel.pain}</span></p>
      <p style="font-size:13px;color:#888">Möglicher Hook: <em>"${ziel.hook}"</em></p>
    </div>
    <div class="result-block">
      <p class="block-label">Wichtigste Website-Botschaft</p>
      <span class="tag tag-amber">${botschaftMap[answers.q9]||""}</span>
    </div>
    <div class="footer-note" id="send-status">
      Deine Antworten werden an Mela übermittelt...
    </div>
  `;

  fetch("https://formsubmit.co/ajax/webdesignbymela@gmail.com",{
    method:"POST",
    headers:{"Content-Type":"application/json","Accept":"application/json"},
    body:JSON.stringify({
      _subject:`Fragebogen-Ergebnis: ${name}`,
      Kundin:name,
      Archetyp:arch.name,
      Käufertyp:buyer.name,
      Zielgruppe:ziel.label,
      Hauptschmerz:schmerzMap[answers.q6]||answers.q6,
      Farbpalette:arch.palette.join(", "),
      Stilrichtung:stilMap[answers.q4]||"",
      Website_Botschaft:botschaftMap[answers.q9]||"",
      _captcha:"false"
    })
  })
  .then(r=>r.json())
  .then(()=>{
    document.getElementById("send-status").innerHTML=`<span class="sent-ok">✓ Ergebnis wurde erfolgreich an Mela übermittelt.</span>`;
  })
  .catch(()=>{
    document.getElementById("send-status").innerHTML=`Ergebnis konnte nicht automatisch gesendet werden. Bitte mach einen Screenshot dieser Seite und schick ihn an Mela.`;
  });
}

renderStep();
</script>
</body>
</html>
